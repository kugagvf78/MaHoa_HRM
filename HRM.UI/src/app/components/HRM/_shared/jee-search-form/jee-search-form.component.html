<div class="sreach-advance-container">

        <img style="padding-left: 0.69rem" class="svg-icon" src="./assets/media/svg/icons/General/Search.svg">
        <input type="text" class="form-control" [placeholder]="titlekeyword" formControlName="keyword" />
        <button mat-icon-button type="button">
            <mat-icon (click)="clearFilter()">close</mat-icon>
        </button>
        <button mat-icon-button type="button">
            <mat-icon (click)="clickShowFilter(showFilter)">arrow_drop_down</mat-icon>
        </button>
    </div>
