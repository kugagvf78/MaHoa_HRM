<div class="modal-content" style="min-height: none;">
  <div class="modal-header">
    <div class="modal-title h4">
      <span class="dialog-title">Đổi mật khẩu</span>
    </div>
  </div>

  <div class="overlay overlay-block cursor-default modal-body overflow-auto" style=" max-height: 70vh;">
    <ng-container *ngIf="isLoadingSubmit$ | async">
      <div class="overlay-layer bg-transparent">
        <div class="spinner spinner-lg spinner-success"></div>
      </div>
    </ng-container>

    <form action="#" class="form form-label-right" [formGroup]="itemForm">
      <div class="form-group row p-0">
        <div class="col-lg-12">
          <mat-form-field class="example-full-width" appearance="fill">
            <mat-label>Mật khẩu cũ</mat-label>
            <input matInput type="password" formControlName="PassWordOld" />
          </mat-form-field>
        </div>
      </div>

      <div class="form-group row p-0">
        <div class="col-lg-12">
          <mat-form-field class="example-full-width" appearance="fill">
            <mat-label>Mật khẩu mới</mat-label>
            <input matInput type="password" formControlName="PassWordNew" />
          </mat-form-field>
        </div>
      </div>

      <div class="form-group row p-0">
        <div class="col-lg-12">
          <mat-form-field class="example-full-width" appearance="fill">
            <mat-label>Nhập lại mật khẩu mới</mat-label>
            <input matInput type="password" formControlName="NhapLaiMatKhau" />
          </mat-form-field>
          <mat-error *ngIf="itemForm.hasError('notSame')">
            Mật khẩu không trùng khớp
          </mat-error>
        </div>
      </div>

      <div class="modal-title" style="display: inline; flex: 2; float: right">
        <button mat-raised-button class="ja_btn-goback" (click)="goBack()">
          Trở lại
        </button>
        <button mat-raised-button class="ja_btn-addcontinue" (click)="onSubmit()">
          Lưu
        </button>
      </div>
    </form>
  </div>
</div>
