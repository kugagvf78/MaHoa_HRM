<ng-container *ngIf="isActive">
  <ng-container *ngIf="activeDirection === 'asc'">
    <img src="/assets/media/svg/icons/Navigation/Up-2.svg" class="svg-icon svg-icon-sm svg-icon-primary ml-1" />

  </ng-container>
  <ng-container *ngIf="activeDirection === 'desc'">
    <img src="/assets/media/svg/icons/Navigation/Down-2.svg" class="svg-icon svg-icon-sm svg-icon-primary ml-1" />
  </ng-container>
</ng-container>

<ng-container *ngIf="!isActive">
  <img src="/assets/media/svg/icons/Shopping/Sort1.svg"
    class="svg-icon svg-icon-sm svg-icon-primary ml-1 svg-icon-sort" />
</ng-container>
